name: Deploy Next.js site to Pages

on:
  # Runs on pushes targeting the default branch
  push:
    branches: ["main"]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# Sets permissions of the GITHUB_TOKEN to allow deployment to GitHub Pages
permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment, skipping runs queued between the run in-progress and latest queued.
# However, do NOT cancel in-progress runs as we want to allow these production deployments to complete.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  # Build job
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Setup Pages
        uses: actions/configure-pages@v5
        with:
          # Automatically inject basePath in your Next.js configuration file and disable
          # server side image optimization (https://nextjs.org/docs/api-reference/next/image#unoptimized).
          #
          # You may remove this line if you want to manage the configuration yourself.
          static_site_generator: next
      - name: Restore cache
        uses: actions/cache@v4
        with:
          path: |
            .next/cache
          # Generate a new cache whenever packages or source files change.
          key: ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-${{ hashFiles('**.[jt]s', '**.[jt]sx') }}
          # If source files changed but packages didn't, rebuild from a prior cache.
          restore-keys: |
            ${{ runner.os }}-nextjs-${{ hashFiles('**/package-lock.json', '**/yarn.lock') }}-
      - name: Install dependencies
        run: npm ci
      - name: Build with Next.js
        env:
          NEXT_PUBLIC_ENABLE_HOME: ${{ vars.NEXT_PUBLIC_ENABLE_HOME }}
          NEXT_PUBLIC_ENABLE_ABOUT: ${{ vars.NEXT_PUBLIC_ENABLE_ABOUT }}
          NEXT_PUBLIC_ENABLE_EXPERIENCE: ${{ vars.NEXT_PUBLIC_ENABLE_EXPERIENCE }}
          NEXT_PUBLIC_ENABLE_TESTING_STRATEGY: ${{ vars.NEXT_PUBLIC_ENABLE_TESTING_STRATEGY }}
          NEXT_PUBLIC_ENABLE_PROJECTS: ${{ vars.NEXT_PUBLIC_ENABLE_PROJECTS }}
          NEXT_PUBLIC_ENABLE_SKILLS: ${{ vars.NEXT_PUBLIC_ENABLE_SKILLS }}
          NEXT_PUBLIC_ENABLE_CASE_STUDIES: ${{ vars.NEXT_PUBLIC_ENABLE_CASE_STUDIES }}
          NEXT_PUBLIC_ENABLE_BLOG: ${{ vars.NEXT_PUBLIC_ENABLE_BLOG }}
          NEXT_PUBLIC_ENABLE_TEST_ARTIFACTS: ${{ vars.NEXT_PUBLIC_ENABLE_TEST_ARTIFACTS }}
          NEXT_PUBLIC_ENABLE_CONTACT: ${{ vars.NEXT_PUBLIC_ENABLE_CONTACT }}
        run: npm run build
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  # Deployment job
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
